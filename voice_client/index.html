<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Swarm Voice Gateway</title>
    <style>
        body { background: #111; color: #0f0; font-family: monospace; padding: 2rem; display: flex; flex-direction: column; height: 100vh; margin: 0; box-sizing: border-box;}
        h1, h2 { margin: 0.5rem 0; }
        button { background: #0f0; color: #111; padding: 1rem; border: none; cursor: pointer; font-weight: bold; font-size: 1.2rem; }
        #chat-container { display: flex; flex-direction: column; flex: 1; margin-top: 1rem; overflow: hidden; background: #000; border: 1px solid #333; }
        #logs { flex: 1; padding: 1rem; overflow-y: auto; text-align: left; }
        .messageRow { margin: 0.5rem 0; padding: 0.5rem; border-radius: 5px; max-width: 80%; }
        .userMsg { background: #0a4a0a; color: #fff; margin-left: auto; text-align: right; border-left: 5px solid #0f0; }
        .modelMsg { background: #222; color: #bbb; margin-right: auto; text-align: left; }
        
        /* Agent Colors */
        .agent-architect { border-left: 5px solid #f0f; color: #f0f; }
        .agent-security { border-left: 5px solid #f00; color: #f00; }
        .agent-researcher { border-left: 5px solid #0ff; color: #0ff; }
        .agent-default { border-left: 5px solid #fa0; color: #fa0; }

        .agentLabel { font-weight: bold; font-size: 0.8rem; margin-bottom: 0.2rem; text-transform: uppercase; }

        #input-area { display: flex; padding: 1rem; background: #111; border-top: 1px solid #333;}
        #text-input { flex: 1; padding: 0.5rem; background: #222; color: #0f0; border: 1px solid #0f0; margin-right: 1rem; font-family: monospace; font-size: 1rem;}
        #btn-send { background: #0f0; color: #111; padding: 0.5rem 1rem; font-weight: bold;}
    </style>
</head>
<body>
    <h1>Aether Swarm Voice Interface</h1>
    <h2 id="status">Status: 🔴 OFFLINE</h2>
    
    <div>
        <button id="btn-start">CONNECT SWARM & ENABLE MIC</button>
        <button id="btn-stop" style="display:none; background: #f00;">SEVER CONNECTION</button>
    </div>

    <div id="chat-container">
        <div id="logs"></div>
        <div id="input-area">
            <input type="text" id="text-input" placeholder="Type messages to the orchestrator..." disabled />
            <button id="btn-send" disabled>SEND</button>
        </div>
    </div>

    <script>
        const GATEWAY_WS_URL = "wss://aether-voice-swarm-679926387543.us-east1.run.app/ws/voice";
        let ws = null;
        let audioContext = null;
        let stream = null;
        let nextTime = 0;
        let speechRecognizer = null;

        let globalSource = null;
        let globalProcessor = null;

        const logDiv = document.getElementById('logs');
        const statusDiv = document.getElementById('status');
        const btnStart = document.getElementById('btn-start');
        const btnStop = document.getElementById('btn-stop');
        const textInput = document.getElementById('text-input');
        const btnSend = document.getElementById('btn-send');

        function appendMessage(role, msg, agentName="Aether Core") {
            const row = document.createElement('div');
            row.className = 'messageRow ' + (role === 'user' ? 'userMsg' : 'modelMsg');
            
            if (role === 'model') {
                const label = document.createElement('div');
                label.className = 'agentLabel';
                label.innerText = agentName;
                row.appendChild(label);

                // Assign color based on agent name
                if (agentName.toLowerCase().includes('architect')) row.classList.add('agent-architect');
                else if (agentName.toLowerCase().includes('security')) row.classList.add('agent-security');
                else if (agentName.toLowerCase().includes('research')) row.classList.add('agent-researcher');
                else row.classList.add('agent-default');
            }

            const content = document.createElement('div');
            content.innerText = msg;
            row.appendChild(content);

            logDiv.appendChild(row);
            logDiv.scrollTop = logDiv.scrollHeight;
            return { row, content };
        }

        function initSpeechRecognition() {
            if (!('webkitSpeechRecognition' in window)) return;
            speechRecognizer = new webkitSpeechRecognition();
            speechRecognizer.continuous = true;
            speechRecognizer.interimResults = true;
            
            let currentUserBubble = null;

            speechRecognizer.onresult = (event) => {
                // Prevent agent TTS from echoing into the user's transcript!
                if (audioContext && nextTime > audioContext.currentTime) {
                    return;
                }

                let interimTranscript = '';
                let finalTranscript = '';
                
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                
                if (finalTranscript || interimTranscript) {
                    if (!currentUserBubble) {
                        const b = appendMessage("user", "");
                        currentUserBubble = b;
                    }
                    currentUserBubble.content.innerText = finalTranscript + interimTranscript;
                }

                if (finalTranscript) {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: "client_turn_complete" }));
                    }
                    currentUserBubble = null;
                }
            };

            speechRecognizer.onerror = (e) => { console.log("Speech recognition error", e); };
            speechRecognizer.start();
        }

        async function start() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
                nextTime = 0;

                ws = new WebSocket(GATEWAY_WS_URL);
                ws.binaryType = "blob";

                ws.onopen = () => {
                    statusDiv.innerText = "Status: 🟢 ONLINE";
                    btnStart.style.display = "none";
                    btnStop.style.display = "inline-block";
                    textInput.disabled = false;
                    btnSend.disabled = false;
                    initSpeechRecognition();
                    appendMessage("model", "Connected to Swarm Voice Gateway.", "System");
                };

                let currentModelMessage = null;
                let currentModelContent = null;
                let currentModelAgent = "Aether Core";

                ws.onmessage = async (event) => {
                    if (event.data instanceof Blob) {
                        const arrayBuffer = await event.data.arrayBuffer();
                        const int16Array = new Int16Array(arrayBuffer);
                        const float32Array = new Float32Array(int16Array.length);
                        for (let i = 0; i < int16Array.length; i++) {
                             float32Array[i] = int16Array[i] / 32768.0;
                        }
                        
                        if (audioContext) {
                            const buffer = audioContext.createBuffer(1, float32Array.length, 24000);
                            buffer.getChannelData(0).set(float32Array);
                            const source = audioContext.createBufferSource();
                            source.buffer = buffer;
                            source.connect(audioContext.destination);
                            
                            if (nextTime < audioContext.currentTime) {
                                nextTime = audioContext.currentTime;
                            }
                            source.start(nextTime);
                            nextTime += buffer.duration;
                        }
                    } else if (typeof event.data === "string") {
                        try {
                            const data = JSON.parse(event.data);
                            if (data.type === "agent_call") {
                                currentModelAgent = data.agent_name;
                                currentModelMessage = null; 
                                appendMessage("model", "(Swarm Persona Switched: " + data.agent_name + ")", data.agent_name);
                            } else if (data.type === "text") {
                                // Agent color coding detection [Role: Architect]
                                let txt = data.text;
                                const roleMatch = txt.match(/\[Role:\s*(.*?)\]/i);
                                if (roleMatch) {
                                    currentModelAgent = roleMatch[1];
                                    txt = txt.replace(roleMatch[0], '').trim();
                                    currentModelMessage = null; // Force new bubble for new agent
                                }
                                
                                if (!currentModelMessage) {
                                    const b = appendMessage("model", "", currentModelAgent);
                                    currentModelMessage = b.row;
                                    currentModelContent = b.content;
                                }
                                currentModelContent.innerText += txt;
                                logDiv.scrollTop = logDiv.scrollHeight;
                            } else if (data.type === "turn_complete") {
                                currentModelMessage = null; 
                                currentModelAgent = "Aether Core";
                            }
                        } catch(e) {
                            appendMessage("model", event.data, "System");
                        }
                    }
                };

                ws.onclose = () => {
                    statusDiv.innerText = "Status: 🔴 OFFLINE";
                    btnStart.style.display = "inline-block";
                    btnStop.style.display = "none";
                    textInput.disabled = true;
                    btnSend.disabled = true;
                    if (speechRecognizer) speechRecognizer.stop();
                    appendMessage("model", "Disconnected.", "System");
                };

                stream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1, sampleRate: 16000 } });
                
                globalSource = audioContext.createMediaStreamSource(stream);
                globalProcessor = audioContext.createScriptProcessor(4096, 1, 1);
                
                globalSource.connect(globalProcessor);
                globalProcessor.connect(audioContext.destination); 
                
                globalProcessor.onaudioprocess = (e) => {
                    // Prevent echoing the Agent's TTS into the microphone stream
                    if (audioContext && nextTime > audioContext.currentTime) {
                        return; // Send precisely NO audio frames while agent speaks
                    }

                    if (ws && ws.readyState === WebSocket.OPEN) {
                        const floatData = e.inputBuffer.getChannelData(0);
                        const pcmData = new Int16Array(floatData.length);
                        for (let i = 0; i < floatData.length; i++) {
                            const s = Math.max(-1, Math.min(1, floatData[i]));
                            pcmData[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                        }
                        ws.send(pcmData.buffer); 
                    }
                };
                
            } catch (err) {
                appendMessage("model", "Error: " + err, "System");
            }
        }

        function stop() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            if (ws) ws.close();
            if (audioContext) audioContext.close();
            if (speechRecognizer) speechRecognizer.stop();
            audioContext = null;
        }

        function sendText() {
            const txt = textInput.value.trim();
            if (txt && ws && ws.readyState === WebSocket.OPEN) {
                appendMessage("user", txt);
                ws.send(JSON.stringify({ type: "client_content", text: txt }));
                textInput.value = "";
            }
        }

        btnStart.addEventListener('click', start);
        btnStop.addEventListener('click', stop);
        btnSend.addEventListener('click', sendText);
        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendText();
        });
    </script>
</body>
</html>
